<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SalaryLens Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 560px;
      margin: 40px auto;
      padding: 0 20px;
      color: #2d2d2d;
    }
    h1 {
      font-size: 24px;
      color: #1a73e8;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #6f6f6f;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .section {
      margin-bottom: 28px;
    }
    .section h2 {
      font-size: 16px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e4e5e7;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #4a4a4a;
    }
    .hint {
      font-size: 12px;
      color: #9e9e9e;
      margin-bottom: 8px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    input:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
    }
    .btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #1557b0; }
    .btn:disabled { background: #ccc; cursor: default; }
    .toast {
      display: none;
      background: #28a745;
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 12px;
    }
    .toast.show { display: inline-block; }
  </style>
</head>
<body>
  <h1>SalaryLens Settings</h1>
  <p class="subtitle">Configure API keys for enhanced salary data.</p>

  <div class="section">
    <h2>BLS API (Optional)</h2>
    <label for="bls-key">Registration Key</label>
    <p class="hint">Free from bls.gov. Increases daily limit from 25 to 500 queries.</p>
    <input type="text" id="bls-key" placeholder="e.g. abc123def456...">
  </div>

  <div class="section">
    <h2>CareerOneStop API (Optional)</h2>
    <label for="cos-userid">User ID</label>
    <input type="text" id="cos-userid" placeholder="Your CareerOneStop User ID">
    <label for="cos-token">API Token</label>
    <p class="hint">Free from careeronestop.org. Used as fallback data source.</p>
    <input type="password" id="cos-token" placeholder="Your API token">
  </div>

  <button class="btn" id="save-btn">Save Settings</button>
  <span class="toast" id="toast">Settings saved!</span>

  <script src="options.js" type="module"></script>
</body>
</html>
